name: Deploy static content to Pages

on:
  push:
    branches: ['master', 'main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages-deploy'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          # Preserve PR preview subdirectories when production deploys.
          clean-exclude: pr-preview/
          # Keep the custom domain pinned on every deploy.
          cname: checkpoint64.com
