    <!-- Structured data: FAQPage (mirrors the in-page FAQ for rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a 'save'?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Whatever your game writes to your hard drive. Checkpoint64 treats the files in a folder as one save and backs them up together. You point it at the folder and pick which files count. We've already set this up for 40+ popular games."
          }
        },
        {
          "@type": "Question",
          "name": "Do you upload while the game is running?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, carefully. Checkpoint64 never locks your save files. If the game is in the middle of saving when we check, we wait a moment and try again — no broken files, no crashes. Most games finish saving in a split second anyway."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if my co-op partner overwrites my upload?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "They can't, on purpose. Only the person holding the lock can upload. If they want to push their version, they have to grab the lock first — and that warns you before it happens. Your last version stays safe in the history; you can always roll back to it."
          }
        },
        {
          "@type": "Question",
          "name": "Do I still need a dedicated server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "For most groups, no. The whole point of a dedicated server is keeping your world online when the host's PC is off. Checkpoint64 covers about 90% of that for a one-time fee: whoever wants to play grabs the lock, plays their session, then pushes the save back. A typical co-op group saves $120–240 a year compared to renting a 24/7 server that sits idle 18 hours a day."
          }
        },
        {
          "@type": "Question",
          "name": "Does this work for console saves?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Only if you can get your console saves onto a PC — like emulators, Xbox or PS+ cloud save exports, and Steam Cloud through your PC. Checkpoint64 itself only runs on Windows, Mac, and Linux."
          }
        },
        {
          "@type": "Question",
          "name": "What will it cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A one-time payment — no monthly fee, no charge per person. We're still picking the exact number. Sign up to the launch list and we'll tell you before everyone else, plus lock you in at the early-bird price."
          }
        },
        {
          "@type": "Question",
          "name": "When does it ship?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Soon — we're testing in private now and aiming for a public launch later this year. Get on the list and we'll send one email the day the Windows, Mac, and Linux versions are ready."
          }
        }
      ]
    }
