        <h1>Checkpoint64 — never lose a game save again</h1>
        <p>Checkpoint64 is a save-file backup tool for PC gamers. It automatically uploads your saves to the cloud, keeps every version, and lets co-op friends share worlds safely with built-in locks. Pay once. Works on Windows, macOS, and Linux.</p>

        <h2>How it works</h2>
        <ol>
          <li><strong>Upload:</strong> Point Checkpoint64 at your save folder. Each upload becomes a labelled version.</li>
          <li><strong>Auto-backup:</strong> Every couple of minutes it checks for changes and uploads only the bytes that moved.</li>
          <li><strong>Restore:</strong> Pick any past version from the history and roll back with one click.</li>
        </ol>

        <h2>Features</h2>
        <ul>
          <li>Full version history for every save</li>
          <li>Co-op locks for shared single-world games (Factorio, Satisfactory, Valheim, V Rising, and more)</li>
          <li>Delta uploads — a 14 MB save where one file moved sends 8 KB</li>
          <li>Per-game backup rules with 40+ presets</li>
          <li>Lightweight background app that runs while you play</li>
          <li>Shared activity logbook so you can see who did what</li>
        </ul>
