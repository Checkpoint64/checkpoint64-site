        <section aria-labelledby="what-h">
          <h2 id="what-h">What problems does Checkpoint64 fix?</h2>
          <ul>
            <li>The host's Factorio crashes mid-save and the shared world is gone.</li>
            <li>A co-op friend played alone and saved over your run.</li>
            <li>You're paying $15/month for a dedicated server your group uses six hours a week.</li>
            <li>The host is on holiday and nobody else has the latest Valheim world.</li>
            <li>You tried a risky build, hated it, and want yesterday's save back.</li>
          </ul>
        </section>

        <section aria-labelledby="how-h">
          <h2 id="how-h">How it works (three steps)</h2>
          <ol>
            <li>
              <strong>Upload.</strong> Point Checkpoint64 at the folder your game writes its
              saves to (for example
              <code>C:\Users\you\AppData\Local\FactoryGame\Saved\</code>). Hit Upload and
              that snapshot becomes version one in the cloud.
            </li>
            <li>
              <strong>Auto-backup.</strong> Flip auto on. Checkpoint64 watches the folder
              every couple of minutes and uploads a new version when anything changes. It
              only sends the bytes that actually changed — a 14&nbsp;MB save where one file
              moved uploads in about 8&nbsp;KB.
            </li>
            <li>
              <strong>Restore.</strong> Open Versions on any save to see the full history.
              Pick one and click Restore — Checkpoint64 puts the files back on disk and
              marks that version as current.
            </li>
          </ol>
        </section>

        <section aria-labelledby="features-h">
          <h2 id="features-h">Features</h2>
          <dl>
            <dt>Full version history</dt>
            <dd>Every upload is a labelled version with file count, size, and what changed since last time. Restore any past version with one click.</dd>

            <dt>Co-op locks for shared single-world games</dt>
            <dd>Factorio, Satisfactory, Valheim, V&nbsp;Rising and similar games only have one live world file at a time. Whoever holds the lock can upload; everyone else downloads. Nobody using it? Grab the lock yourself. No more "who has the latest save?"</dd>

            <dt>Delta uploads — only the bytes that changed</dt>
            <dd>A 14&nbsp;MB save where one file moved uploads in 8&nbsp;KB. Easy on your internet and your storage.</dd>

            <dt>Per-game backup rules</dt>
            <dd>Choose which files to back up and which to ignore. Skip crash logs and screenshots, keep the save. 40+ popular games come pre-configured.</dd>

            <dt>Lightweight background app</dt>
            <dd>Runs quietly while you play, checks every two minutes, rests when nothing changed. Doesn't lock your save files — if the game is in the middle of writing, Checkpoint64 waits a moment and tries again.</dd>

            <dt>Shared group logbook</dt>
            <dd>Every upload, restore, and lock-grab is written down in your group's shared activity log. Handy for co-op friends, modded servers, and speedrun teams.</dd>
          </dl>
        </section>

          <h2 id="vs-h">Checkpoint64 vs a dedicated co-op server</h2>
          <p>
            A dedicated server costs roughly $120–$240 per year and sits idle ~18 hours
            a day for most groups. Checkpoint64 covers about 90% of what a dedicated
            server does for co-op groups — whoever wants to play grabs the lock, plays
            their session, then pushes the save back — for a one-time fee. Cheaper for
            small groups, no monthly bill, and your world history is preserved instead
            of overwritten.
          </p>

        <section aria-labelledby="faq-h">
          <h2 id="faq-h">Frequently asked questions</h2>

          <h3>What is a "save"?</h3>
          <p>Whatever your game writes to your hard drive. Checkpoint64 treats the files in a folder as one save and backs them up together. You point it at the folder and pick which files count. 40+ popular games come pre-configured.</p>

          <h3>Do you upload while the game is running?</h3>
          <p>Yes, carefully. Checkpoint64 never locks your save files. If the game is in the middle of saving when we check, we wait a moment and try again — no broken files, no crashes.</p>

          <h3>What happens if my co-op partner overwrites my upload?</h3>
          <p>They can't, on purpose. Only the person holding the lock can upload. To push their version they have to grab the lock first, and that warns you before it happens. Your last version stays safe in the history and you can always roll back to it.</p>

          <h3>Do I still need a dedicated server?</h3>
          <p>For most co-op groups, no. The whole point of a dedicated server is keeping your world online when the host's PC is off. Checkpoint64 covers about 90% of that for a one-time fee: whoever wants to play grabs the lock, plays their session, then pushes the save back. A typical co-op group saves $120–$240 a year compared to renting a 24/7 server that sits idle 18 hours a day.</p>

          <h3>Does this work for console saves?</h3>
          <p>Only if you can get your console saves onto a PC — for example via emulators, Xbox or PS+ cloud save exports, or Steam Cloud through your PC. Checkpoint64 itself only runs on Windows, macOS, and Linux.</p>

          <h3>What will it cost?</h3>
          <p>A one-time payment — no monthly fee, no charge per person. The exact number is still being decided. Sign up to the launch list and we'll tell you before everyone else, plus lock you in at the early-bird price.</p>

          <h3>When does it ship?</h3>
          <p>Checkpoint64 is in private testing now and aiming for a public launch later this year for Windows, macOS, and Linux. Get on the list and we'll send one email the day it's ready.</p>
        </section>
