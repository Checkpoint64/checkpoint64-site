<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Outer body -->
  <rect x="8" y="8" width="48" height="48" fill="#0b0b0b"/>

  <!-- Blue floppy body -->
  <rect x="10" y="10" width="44" height="44" fill="#284b8f"/>
  <rect x="12" y="10" width="6" height="44" fill="#3f66ad"/>
  <rect x="10" y="10" width="44" height="2" fill="#567dc2"/>

  <!-- Top notch -->
  <rect x="48" y="10" width="4" height="2" fill="#284b8f"/>
  <rect x="50" y="12" width="4" height="2" fill="#284b8f"/>
  <rect x="52" y="14" width="2" height="2" fill="#284b8f"/>

  <!-- Metal shutter -->
  <rect x="20" y="10" width="24" height="14" fill="#d9d9d9"/>
  <rect x="22" y="12" width="18" height="10" fill="#bfbfbf"/>
  <rect x="38" y="14" width="4" height="8" fill="#1c2e5e"/>

  <!-- Label -->
  <rect x="16" y="30" width="32" height="20" fill="#f2f2f2"/>
  <rect x="16" y="30" width="32" height="2" fill="#4e83d8"/>

  <!-- Label lines -->
  <rect x="22" y="38" width="20" height="1" fill="#b3b3b3"/>
  <rect x="22" y="43" width="20" height="1" fill="#b3b3b3"/>

  <!-- Bottom tabs -->
  <rect x="12" y="46" width="3" height="3" fill="#0b0b0b"/>
  <rect x="49" y="46" width="3" height="3" fill="#0b0b0b"/>
</svg>
